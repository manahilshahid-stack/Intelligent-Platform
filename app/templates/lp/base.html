<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Merantix Capital — LP Portal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg:       #fafafa;
      --fg:       #111111;
      --card:     #ffffff;
      --border:   #e5e5e5;
      --muted:    #737373;
      --accent:   #d4f53c;   /* Merantix yellow-green */
      --accent-fg:#111111;
      --radius:   0.75rem;
      --shadow:   0 10px 40px -12px rgba(0,0,0,0.14);
    }

    /* ── Base ──────────────────────────────────────────────────────────────── */
    html { font-size: 16px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      letter-spacing: -0.02em;
    }

    /* ── Ambient bg elements ───────────────────────────────────────────────── */
    .ambient-top {
      pointer-events: none;
      position: fixed; top: -160px; left: -160px;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,245,60,0.28) 0%, transparent 70%);
      filter: blur(60px); z-index: 0;
    }
    .ambient-bot {
      pointer-events: none;
      position: fixed; bottom: -180px; right: -140px;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,245,60,0.18) 0%, transparent 70%);
      filter: blur(80px); z-index: 0;
    }
    .grid-bg {
      pointer-events: none;
      position: fixed; inset: 0; z-index: 0; opacity: 0.35;
      background-image:
        linear-gradient(rgba(17,17,17,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17,17,17,0.055) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Layout helpers ────────────────────────────────────────────────────── */
    .page { position: relative; z-index: 1; min-height: 100vh; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .max-w-md  { max-width: 28rem; }
    .max-w-5xl { max-width: 64rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .py-4  { padding-top: 1rem;   padding-bottom: 1rem; }
    .py-16 { padding-top: 4rem;   padding-bottom: 4rem; }

    /* ── Topbar ────────────────────────────────────────────────────────────── */
    .topbar {
      position: relative; z-index: 10;
      border-bottom: 1px solid var(--border);
      background: rgba(250,250,250,0.85);
      backdrop-filter: blur(12px);
    }
    .topbar-inner {
      max-width: 72rem; margin: 0 auto;
      padding: 0 1.5rem;
      height: 4rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-mark {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 1rem;
      color: var(--fg); text-decoration: none;
    }
    .logo-box {
      width: 32px; height: 32px;
      background: var(--fg); color: #fff;
      display: grid; place-items: center;
      border-radius: 6px;
      font-size: 0.75rem; font-weight: 800;
      letter-spacing: -0.03em;
    }

    /* ── Card / Auth shell ─────────────────────────────────────────────────── */
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2);
      padding: 2rem;
      box-shadow: var(--shadow);
    }
    .badge {
      display: inline-block;
      font-size: 0.625rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.2em;
      color: var(--accent-fg); background: var(--accent);
      padding: 0.25rem 0.625rem; border-radius: 999px;
      margin-bottom: 0.5rem;
    }
    .badge-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Form elements ─────────────────────────────────────────────────────── */
    .field { display: block; margin-bottom: 1rem; }
    .field-label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.6875rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin-bottom: 0.375rem;
    }
    .field-hint { font-size: 0.625rem; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .inp {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .inp:focus {
      border-color: var(--fg);
      box-shadow: 0 0 0 3px rgba(17,17,17,0.08);
    }
    .inp::placeholder { color: #b0b0b0; }
    textarea.inp { resize: vertical; min-height: 120px; line-height: 1.6; }
    .inp-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* ── Buttons ───────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      font-family: inherit; font-size: 0.875rem; font-weight: 600;
      border: none; border-radius: 999px; padding: 0.875rem 1.5rem;
      cursor: pointer; transition: opacity 0.15s, transform 0.15s;
      text-decoration: none; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--fg); color: #fff; width: 100%; }
    .btn-secondary {
      background: transparent; color: var(--fg);
      border: 1px solid var(--border);
    }
    .btn-accent { background: var(--accent); color: var(--accent-fg); }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.8125rem; }
    .btn-icon {
      width: 2.75rem; height: 2.75rem; padding: 0;
      border-radius: 999px;
      background: var(--fg); color: #fff;
      border: none; cursor: pointer;
      display: grid; place-items: center;
      transition: opacity 0.15s;
    }
    .btn-icon:hover { opacity: 0.85; }
    .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Alerts ────────────────────────────────────────────────────────────── */
    .alert {
      display: flex; align-items: flex-start; gap: 0.75rem;
      border-radius: var(--radius);
      padding: 0.875rem 1rem; margin-bottom: 1.25rem;
      font-size: 0.875rem; line-height: 1.5;
    }
    .alert-error {
      background: #fff1f1; color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .alert-info {
      background: #f0f9ff; color: #0369a1;
      border: 1px solid #bae6fd;
    }

    /* ── Typography helpers ────────────────────────────────────────────────── */
    .text-muted  { color: var(--muted); }
    .text-accent { color: var(--accent-fg); }
    .text-xs     { font-size: 0.75rem; }
    .text-sm     { font-size: 0.875rem; }
    .text-center { text-align: center; }
    .mt-1  { margin-top: 0.25rem; }
    .mt-2  { margin-top: 0.5rem; }
    .mt-4  { margin-top: 1rem; }
    .mt-6  { margin-top: 1.5rem; }
    .mt-8  { margin-top: 2rem; }
    .mb-1  { margin-bottom: 0.25rem; }
    .mb-4  { margin-bottom: 1rem; }
    .mb-6  { margin-bottom: 1.5rem; }
    .gap-2 { gap: 0.5rem; }
    .flex  { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }

    /* ── Chip tags ─────────────────────────────────────────────────────────── */
    .chip-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.5rem 1rem; border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.8125rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      background: var(--card); color: var(--fg);
      user-select: none;
    }
    .chip:hover { border-color: var(--fg); }
    .chip.active {
      background: var(--fg); color: #fff; border-color: var(--fg);
    }
    .chip input[type=checkbox], .chip input[type=radio] { display: none; }

    /* ── Radio option cards ────────────────────────────────────────────────── */
    .option-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--card);
      cursor: pointer; transition: all 0.15s; margin-bottom: 0.5rem;
    }
    .option-card:hover { border-color: var(--fg); }
    .option-card.active { border-color: var(--fg); box-shadow: 0 0 0 2px rgba(17,17,17,0.1); }
    .option-card input { display: none; }
    .option-dot {
      width: 1.125rem; height: 1.125rem; border-radius: 999px;
      border: 1px solid var(--border);
      display: grid; place-items: center; flex-shrink: 0;
      transition: all 0.15s;
    }
    .option-card.active .option-dot {
      background: var(--fg); border-color: var(--fg);
    }
    .option-dot::after {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: #fff; opacity: 0;
    }
    .option-card.active .option-dot::after { opacity: 1; }

    /* ── Progress dots ─────────────────────────────────────────────────────── */
    .progress-track { display: flex; align-items: center; gap: 0.375rem; }
    .progress-dot {
      height: 6px; border-radius: 999px;
      background: var(--border); transition: all 0.25s;
    }
    .progress-dot.done  { width: 24px; background: var(--accent); }
    .progress-dot.active { width: 40px; background: var(--fg); }
    .progress-dot.idle  { width: 24px; }

    /* ── OTP inputs ────────────────────────────────────────────────────────── */
    .otp-row { display: flex; gap: 0.5rem; justify-content: center; }
    .otp-inp {
      width: 3.25rem; height: 3.75rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      text-align: center; font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700; color: var(--fg);
      background: var(--bg); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .otp-inp:focus {
      border-color: var(--fg);
      box-shadow: 0 0 0 3px rgba(17,17,17,0.08);
    }

    /* ── Funnel cards ──────────────────────────────────────────────────────── */
    .funnel-grid { display: grid; gap: 1rem; grid-template-columns: 1fr; }
    @media (min-width: 768px) { .funnel-grid { grid-template-columns: repeat(3, 1fr); } }
    .funnel-card {
      display: flex; flex-direction: column;
      border-radius: calc(var(--radius) * 2);
      border: 1px solid var(--border);
      padding: 1.75rem;
      text-decoration: none; color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .funnel-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .funnel-card-dark { background: var(--fg); color: #fff; border-color: rgba(255,255,255,0.1); }
    .funnel-card-accent { background: var(--accent); color: var(--accent-fg); border-color: rgba(0,0,0,0.08); }
    .funnel-card-plain { background: var(--card); }
    .funnel-icon {
      width: 2.75rem; height: 2.75rem; border-radius: 0.625rem;
      display: grid; place-items-center: center; place-items: center;
      margin-bottom: 1.5rem; font-size: 1.25rem;
    }
    .funnel-icon-dark { background: rgba(255,255,255,0.12); }
    .funnel-icon-accent { background: rgba(0,0,0,0.1); }
    .funnel-icon-plain { background: #f0f0f0; }
    .funnel-eyebrow {
      font-size: 0.625rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.2em;
      margin-bottom: 0.25rem; opacity: 0.6;
    }
    .funnel-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 0.5rem;
    }
    .funnel-body { font-size: 0.8125rem; line-height: 1.6; opacity: 0.75; }
    .funnel-arrow { margin-top: auto; padding-top: 1.25rem; font-size: 1rem; opacity: 0.5; }

    /* ── Profile card ──────────────────────────────────────────────────────── */
    .profile-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 2); padding: 1.75rem;
    }
    .avatar {
      width: 5rem; height: 5rem; border-radius: 1rem;
      background: #e8e8e8; display: grid; place-items: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700; color: var(--fg);
      flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .pref-grid {
      display: grid; gap: 1.5rem; grid-template-columns: 1fr;
      border-top: 1px solid var(--border); margin-top: 1.5rem; padding-top: 1.5rem;
    }
    @media (min-width: 768px) { .pref-grid { grid-template-columns: repeat(3, 1fr); } }
    .pref-label {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.18em; color: var(--muted); margin-bottom: 0.5rem;
    }
    .pref-chip {
      display: inline-block; background: #f0f0f0;
      padding: 0.25rem 0.625rem; border-radius: 999px;
      font-size: 0.75rem; font-weight: 500; margin: 0.15rem;
    }
    .empty-hint { font-size: 0.8125rem; font-style: italic; color: var(--muted); }

    /* ── Chat ──────────────────────────────────────────────────────────────── */
    .chat-page {
      display: flex; flex-direction: column;
      height: calc(100vh - 4rem);
    }
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; flex-shrink: 0;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 1.25rem;
      background: var(--bg);
    }
    .msg { display: flex; gap: 0.75rem; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 2rem; height: 2rem; border-radius: 0.5rem;
      display: grid; place-items: center; flex-shrink: 0;
      font-size: 0.75rem; font-weight: 700;
    }
    .msg-avatar-ai { background: var(--card); border: 1px solid var(--border); color: var(--fg); }
    .msg-avatar-user { background: var(--fg); color: #fff; }
    .msg-bubble {
      max-width: 78%; padding: 0.875rem 1.125rem;
      border-radius: 1rem; font-size: 0.875rem; line-height: 1.65;
    }
    .msg-bubble-ai { background: var(--card); border: 1px solid var(--border); color: var(--fg); border-top-left-radius: 2px; }
    .msg-bubble-user { background: var(--fg); color: #fff; border-top-right-radius: 2px; }
    .msg-bubble p { margin: 0.4rem 0; }
    .msg-bubble p:first-child { margin-top: 0; }
    .msg-bubble p:last-child  { margin-bottom: 0; }
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble ul { padding-left: 1.25rem; margin: 0.4rem 0; }
    .msg-bubble li { margin: 0.25rem 0; }
    .msg-bubble h3 { font-family: 'Space Grotesk', sans-serif; font-size: 0.9375rem; margin: 0.5rem 0 0.25rem; }
    .typing-dots { display: inline-flex; gap: 3px; align-items: center; height: 1rem; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .chat-suggestions { padding: 0 1.5rem 1rem; }
    .suggestion-label {
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.18em; color: var(--muted); margin-bottom: 0.5rem;
    }
    .suggestion-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .suggestion-chip {
      padding: 0.5rem 0.875rem; border-radius: 999px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 0.8125rem; cursor: pointer; transition: all 0.15s;
      color: var(--fg);
    }
    .suggestion-chip:hover { border-color: var(--fg); background: var(--fg); color: #fff; }
    .chat-input-bar {
      display: flex; gap: 0.5rem; align-items: center;
      padding: 0.875rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .chat-inp {
      flex: 1; padding: 0.875rem 1.25rem;
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 0.875rem; font-family: inherit;
      background: var(--card); color: var(--fg); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .chat-inp:focus { border-color: var(--fg); box-shadow: 0 0 0 3px rgba(17,17,17,0.06); }
    .chat-inp::placeholder { color: #b0b0b0; }

    /* ── Divider ───────────────────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* ── Spinner ───────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 1rem; height: 1rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner-dark {
      border: 2px solid rgba(17,17,17,0.15);
      border-top-color: var(--fg);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc ──────────────────────────────────────────────────────────────── */
    a { color: var(--fg); }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .slide-in { animation: slideIn 0.25s ease-out; }

    {% block head %}{% endblock %}
  </style>
</head>
<body>
  <div class="ambient-top"></div>
  <div class="ambient-bot"></div>
  <div class="grid-bg"></div>
  {% block body %}{% endblock %}
</body>
</html>
