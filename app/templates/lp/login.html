{% extends "lp/base.html" %}

{% block title %}Login – Portfolio Intelligence LP Portal{% endblock %}

{% block body %}
<div class="container">
    <div class="logo">
        <h1>Portfolio Intelligence</h1>
        <p>Limited Partner Portal</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/lp/login">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>

        <button type="submit" style="width: 100%; padding: 0.875rem;">Sign In</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/lp/register">Create one here</a>
    </div>
</div>
{% endblock %}
